<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定商取引法に基づく表記 | ЯETRA</title>
<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:#050505;
    color:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

main{
    width:min(1080px,100%);
    margin:0 auto;
    padding:100px 24px 120px;
}

.logo{
    font-size:22px;
    letter-spacing:.16em;
    margin-bottom:52px;
}

h1{
    font-size:52px;
    font-weight:250;
    letter-spacing:-.06em;
    margin:0 0 22px;
}

.lead{
    color:rgba(255,255,255,.58);
    line-height:1.9;
    margin-bottom:70px;
}

.table{
    border-radius:34px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,.06),
            rgba(255,255,255,.02)
        );
}

.row{
    display:grid;
    grid-template-columns:260px 1fr;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.row:last-child{
    border-bottom:none;
}

.label{
    padding:28px 30px;
    background:rgba(255,255,255,.03);
    color:rgba(255,255,255,.92);
    font-size:14px;
    font-weight:500;
}

.value{
    padding:28px 30px;
    color:rgba(255,255,255,.68);
    line-height:2;
    font-size:14px;
}

.footer{
    margin-top:60px;
    font-size:13px;
    color:rgba(255,255,255,.42);
}

a{
    color:#fff;
    text-decoration:none;
}

@media(max-width:720px){

    h1{
        font-size:40px;
    }

    .row{
        grid-template-columns:1fr;
    }

    .label{
        padding-bottom:10px;
    }

    .value{
        padding-top:0;
    }
}
</style>
</head>
<body>

<main>

    <div class="logo">ЯETRA</div>

    <h1>特定商取引法に基づく表記</h1>

    <p class="lead">
        ЯETRAに関する販売情報を、
        特定商取引法に基づき表示しています。
    </p>

    <div class="table">

        <div class="row">
            <div class="label">販売事業者</div>
            <div class="value">
                ЯETRA TOKYO
            </div>
        </div>

        <div class="row">
            <div class="label">運営責任者</div>
            <div class="value">
                HiROYUKI
            </div>
        </div>

        <div class="row">
            <div class="label">お問い合わせ先</div>
            <div class="value">
                contact@retra.tokyo
            </div>
        </div>

        <div class="row">
            <div class="label">販売価格</div>
            <div class="value">
                各商品ページに表示された価格に基づきます。
            </div>
        </div>

        <div class="row">
            <div class="label">支払い方法</div>
            <div class="value">
                クレジットカード、
                Apple Pay、
                Google Pay、
                その他対応決済
            </div>
        </div>

        <div class="row">
            <div class="label">商品の引渡時期</div>
            <div class="value">
                決済確認後、
                順次発送いたします。
            </div>
        </div>

        <div class="row">
            <div class="label">返品・キャンセル</div>
            <div class="value">
                初期不良を除き、
                原則として返品・交換は受け付けておりません。
            </div>
        </div>

    </div>

    <div class="footer">
        © 2026 ЯETRA TOKYO
    </div>

</main>

</body>
</html>
