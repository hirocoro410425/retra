<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support | ЯETRA</title>
<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:#050505;
    color:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 7%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:50;
    background:rgba(5,5,5,.58);
    backdrop-filter:blur(30px);
    border-bottom:1px solid rgba(255,255,255,.055);
}

.logo{
    font-size:20px;
    font-weight:500;
    letter-spacing:.16em;
    color:rgba(255,255,255,.92);
    text-decoration:none;
}

nav{
    display:flex;
    align-items:center;
    gap:28px;
}

nav a{
    color:rgba(255,255,255,.68);
    text-decoration:none;
    font-size:12px;
}

.nav-buy{
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#000!important;
}

.lang-toggle{
    border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.055);
    color:rgba(255,255,255,.78);
    border-radius:999px;
    padding:8px 12px;
    font-size:11px;
    cursor:pointer;
    font-family:inherit;
}

main{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:120px 24px 80px;
}

.card{
    width:min(760px,100%);
    padding:56px;
    border-radius:34px;
    background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.11);
}

h1{
    font-size:42px;
    font-weight:250;
    letter-spacing:-.06em;
    margin:0 0 18px;
}

p{
    color:rgba(255,255,255,.62);
    line-height:1.9;
}

a{
    color:#fff;
    text-decoration:none;
}

.link{
    display:inline-block;
    margin-top:18px;
    padding:12px 18px;
    border-radius:999px;
    background:#fff;
    color:#000;
}

.back{
    display:inline-block;
    margin-top:34px;
    color:rgba(255,255,255,.5);
    font-size:13px;
}

@media(max-width:620px){
    header{padding:16px 5%}
    nav{gap:8px}
    nav a{font-size:10px}
    .nav-buy{padding:7px 10px}
    .lang-toggle{padding:7px 9px;font-size:10px}
    .card{padding:36px 26px}
    h1{font-size:34px}
}
</style>
</head>
<body>

<header>
    <a class="logo" href="index.html">ЯETRA</a>
    <nav>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="tokushoho.html">Legal</a>
        <a class="nav-buy" href="index.html#buy" data-ja="購入する" data-en="Buy">購入する</a>
        <button class="lang-toggle" type="button" data-lang-toggle>EN</button>
    </nav>
</header>

<main>
    <section class="card">
        <h1>Support</h1>
        <p data-ja="ЯETRAに関するお問い合わせは、以下のメールアドレスへご連絡ください。" data-en="For inquiries about ЯETRA, please contact us at the email address below.">ЯETRAに関するお問い合わせは、以下のメールアドレスへご連絡ください。</p>
        <a class="link" href="mailto:support@retra.tokyo">support@retra.tokyo</a>
        <br>
        <a class="back" href="index.html" data-ja="ЯETRAトップへ戻る" data-en="Back to ЯETRA">ЯETRAトップへ戻る</a>
    </section>
</main>

<script>
const applyLanguage = (lang) => {
    document.documentElement.lang = lang;
    localStorage.setItem("retraLanguage", lang);

    document.querySelectorAll("[data-ja][data-en]").forEach((element) => {
        element.innerHTML = element.dataset[lang];
    });

    document.querySelectorAll("[data-lang-toggle]").forEach((button) => {
        button.textContent = lang === "ja" ? "EN" : "JP";
    });
};

document.querySelectorAll("[data-lang-toggle]").forEach((button) => {
    button.addEventListener("click", () => {
        const current = localStorage.getItem("retraLanguage") || "ja";
        applyLanguage(current === "ja" ? "en" : "ja");
    });
});

applyLanguage(localStorage.getItem("retraLanguage") || "ja");
</script>

</body>
</html>
