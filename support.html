<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support | ЯETRA</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    background:#050505;
    color:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}
main{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 24px;
}
.card{
    width:min(760px,100%);
    padding:56px;
    border-radius:34px;
    background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.11);
}
.logo{
    font-size:22px;
    letter-spacing:.16em;
    margin-bottom:42px;
}
h1{
    font-size:42px;
    font-weight:250;
    letter-spacing:-.06em;
    margin:0 0 18px;
}
p{
    color:rgba(255,255,255,.62);
    line-height:1.9;
}
a{
    color:#fff;
    text-decoration:none;
}
.link{
    display:inline-block;
    margin-top:18px;
    padding:12px 18px;
    border-radius:999px;
    background:#fff;
    color:#000;
}
.back{
    display:inline-block;
    margin-top:34px;
    color:rgba(255,255,255,.5);
    font-size:13px;
}
@media(max-width:620px){
    .card{padding:36px 26px}
    h1{font-size:34px}
}
</style>
</head>
<body>
<main>
    <section class="card">
        <div class="logo">ЯETRA</div>
        <h1>Support</h1>
        <p>ЯETRAに関するお問い合わせは、以下のメールアドレスへご連絡ください。</p>
        <a class="link" href="mailto:support@retra.tokyo">support@retra.tokyo</a>
        <br>
        <a class="back" href="index.html">ЯETRAトップへ戻る</a>
    </section>
    
</main>
</body>
</html>
