<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy | ЯETRA</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    background:#050505;
    color:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}
main{
    width:min(980px,100%);
    margin:0 auto;
    padding:100px 24px 120px;
}
.logo{
    font-size:22px;
    letter-spacing:.16em;
    margin-bottom:52px;
}
h1{
    font-size:52px;
    font-weight:250;
    letter-spacing:-.06em;
    margin:0 0 20px;
}
.lead{
    color:rgba(255,255,255,.58);
    line-height:1.9;
    margin-bottom:70px;
}
.section{
    margin-bottom:56px;
    padding:36px;
    border-radius:30px;
    background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);
}
.section h2{
    margin:0 0 18px;
    font-size:24px;
    font-weight:500;
}
.section p{
    margin:0;
    line-height:2;
    color:rgba(255,255,255,.68);
}
.footer{
    margin-top:60px;
    font-size:13px;
    color:rgba(255,255,255,.42);
}
a{
    color:#fff;
    text-decoration:none;
}
@media(max-width:640px){
    h1{
        font-size:40px;
    }

    .section{
        padding:28px;
    }
}
</style>
</head>
<body>

<main>

    <div class="logo">ЯETRA</div>

    <h1>Privacy Policy</h1>

    <p class="lead">
        ЯETRAは、ユーザーのプライバシーを尊重し、
        個人情報を適切に保護・管理します。
    </p>

    <section class="section">
        <h2>取得する情報</h2>
        <p>
            ЯETRAでは、アカウント情報、端末情報、
            利用状況、購入情報などを取得する場合があります。
        </p>
    </section>

    <section class="section">
        <h2>利用目的</h2>
        <p>
            サービス提供、サポート対応、
            機能改善、不正利用防止のために利用します。
        </p>
    </section>

    <section class="section">
        <h2>第三者提供</h2>
        <p>
            法令に基づく場合を除き、
            ユーザーの同意なく第三者へ提供しません。
        </p>
    </section>

    <section class="section">
        <h2>お問い合わせ</h2>
        <p>
            contact@retra.tokyo
        </p>
    </section>

    <div class="footer">
        © 2026 ЯETRA TOKYO
    </div>

</main>

</body>
</html>
